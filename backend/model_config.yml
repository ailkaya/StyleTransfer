# ============================================
# 可用基础模型配置
# ============================================
# key: 模型标识（存储在数据库和前端使用）
# value: 该模型的完整配置信息
#
# 各字段说明:
#   hf_name      -> HuggingFace 模型名称或本地路径（训练和推理时加载用）
#   display_name -> 前端展示名称
#   type         -> 模型系列标识（如 llama / qwen），前端据此渲染徽章文字
#   description  -> 前端模型卡片中的描述文案
#   params       -> 参数量说明（如 "3B参数"），前端展示在规格行
#   speed        -> 速度标签（如 "速度较快"），前端展示在规格行
#   speed_value  -> 速度参考值（token/秒），前端估算训练时间时使用
# ============================================

base_models:
  llama-3.2-1b:
    hf_name: "meta-llama/Llama-3.2-1B-Instruct"
    display_name: "LLaMA-3.2-1B"
    type: "llama"
    description: "Meta开源的基础模型，性能均衡"
    params: "1B参数"
    speed: "速度较快"
    speed_value: 800

  qwen3-1.7b:
    hf_name: "Qwen/Qwen3-1.7B"
    display_name: "Qwen3-1.7B"
    type: "qwen"
    description: "阿里Qwen3系列，双模式推理，119种语言支持"
    params: "1.7B参数"
    speed: "轻量高效"
    speed_value: 1000

  deepseek-r1-distill-qwen-1.5b:
    hf_name: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
    display_name: "DeepSeek-R1-Distill-1.5B"
    type: "qwen"
    description: "基于Qwen架构经R1深度蒸馏，支持复杂逻辑链思考"
    params: "1.5B参数"
    speed: "极速推理"
    speed_value: 1200

  minicpm-2b:
    hf_name: "openbmb/MiniCPM-2B-sft-bf16"
    display_name: "MiniCPM-2B"
    type: "minicpm"
    description: "清华面壁智能出品，中文能力媲美7B模型，端侧部署首选"
    params: "2.4B参数"
    speed: "端侧极速"
    speed_value: 900