# Docker Compose 测试环境配置
# 包含 PostgreSQL 和 Redis 服务

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: style_transfer_postgres
    environment:
      POSTGRES_DB: style_transfer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - style_transfer_network

  # Redis 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: style_transfer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - style_transfer_network

volumes:
  postgres_data:
  redis_data:

networks:
  style_transfer_network:
    driver: bridge
